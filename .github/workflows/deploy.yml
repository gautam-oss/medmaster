name: CI — Test, Build & Push to ECR

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements/ci.txt

      # ── 3. Install CI dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements/ci.txt

      # ── 4. Run tests ─────────────────────────────────────────────────────────
      - name: Run pytest
        run: pytest tests/ -v --tb=short

      # ── 5. AWS credentials ───────────────────────────────────────────────────
      # Only on push to main — pull requests skip steps 5-7
      - name: Configure AWS credentials
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ── 6. Log in to ECR ─────────────────────────────────────────────────────
      - name: Login to Amazon ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 7. Build, tag and push Docker image ──────────────────────────────────
      - name: Build, tag and push image to ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          echo "Building $ECR_REGISTRY:$IMAGE_TAG"
          docker build -t $ECR_REGISTRY:$IMAGE_TAG .
          docker tag  $ECR_REGISTRY:$IMAGE_TAG $ECR_REGISTRY:latest
          docker push $ECR_REGISTRY:$IMAGE_TAG
          docker push $ECR_REGISTRY:latest
          echo "### Image pushed to ECR" >> $GITHUB_STEP_SUMMARY
          echo "- Registry: \`$ECR_REGISTRY\`" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: \`$IMAGE_TAG\`" >> $GITHUB_STEP_SUMMARY